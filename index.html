<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>
    <style>
        body{
            background-image: url(https://i.pinimg.com/originals/ef/7a/b3/ef7ab30663b879ba8c40552b8560364a.gif);
            background-size: 1300px;
        }
        h1{
            font-family: 'Courier New', Courier, monospace;
            color: bisque;
            background-color: rgb(4, 4, 4);
            border-radius: 30px;
            padding: 5px;
            border: 3px dotted bisque;
        }
        details{
            font-family: 'Courier New', Courier, monospace;
            color: bisque;
        }
        label{
    font-family: 'Courier New', Courier, monospace;
    color: bisque;
            background-color: rgb(4, 4, 4);
            border-radius: 30px;
            padding: 5px;
            border: 3px dotted bisque;
}


    </style>
</head>
<body>
    <h1>Heat Index Checker</h1>
    <details ontoggle="message1()">
        <summary><u>Instructions</u></summary>
        <i id="message"></i>
    </details>
   
    <label>Degree in celsius</label>
    <input type="number" id="temp" placeholder="Input valid dgree value"> 
    
    <br>

    <label>Humidity in percentage</label>
  <input type="number" id="humidity" placeholder="Input percentage value">

  <br>

     <button class="btn btn-warning" onclick="heatIndex()">Check</button>

   <script>
        function message1(){
            document.getElementById('message').innerHTML = "Please input the temp in celsius and the humidity in percentage, then click check to see the heat index and status.";
        }
function heatIndex() {

  let temp = Number(document.getElementById("temp").value);
  let humidity = Number(document.getElementById("humidity").value);

  let heatIndex = temp + (humidity / 10);

  let status = "";

  if (heatIndex <= 27) {
    status = "Comfortable / Cool";
  } 
  else if (heatIndex <= 32) {
    status = "Warm";
  } 
  else if (heatIndex <= 37) {
    status = "Hot";
  } 
  else if (heatIndex <= 41) {
    status = "Very Hot / Caution";
  } 
  else {
    status = "Extreme Heat / Danger";
  }

  // Simple alert (one line only)
  alert("Heat Index: " + heatIndex + "°C, Status: " + status);
}
        
    </script>
</body>
</html>
